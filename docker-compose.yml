services:
  api:
    build:
      context: .
      target: prod
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/fastiq
      - APP_ENV=production
      - DEBUG=false
      - SECRET_KEY=prod_secret_key_change_me_in_production_1234567890
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=fastiq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastiq"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
