services:
  api:
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/fastiq
      - APP_ENV=development
      - DEBUG=true
      - SECRET_KEY=dev_secret_key_change_me_in_production_1234567890
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=fastiq
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastiq"]
      interval: 5s
      timeout: 5s
      retries: 5
